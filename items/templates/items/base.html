{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Менеджер предметов{% endblock %}</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Custom styles -->
    <link rel="stylesheet" href="{% static 'items/css/styles.css' %}?v=4">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Toast container -->
    <div class="toast-container" id="toastContainer"></div>

    <div class="container-fluid px-4">
        {% block content %}{% endblock %}
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- App scripts -->
    <script src="{% static 'items/js/utils.js' %}?v=3"></script>
    <script src="{% static 'items/js/items.js' %}?v=11"></script>
    <script src="{% static 'items/js/expenses.js' %}?v=2"></script>
    <script src="{% static 'items/js/flesh.js' %}?v=1"></script>
    <script src="{% static 'items/js/main.js' %}?v=4"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
